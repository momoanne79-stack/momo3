<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수리나무학원 Grammar Only 1</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --main: #6c3fa0;
            --main2: #4a2070;
            --accent: #f0b429;
            --accent2: #e8960a;
            --light: #f5f0ff;
            --bg: #faf8ff;
            --text: #1e1530;
            --green: #22c55e;
            --red: #ef4444;
            --shadow: 0 8px 40px rgba(108,63,160,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }

        #app { max-width: 480px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: var(--shadow); overflow: hidden; position: relative; padding-bottom: 32px; }

        /* HEADER */
        .header { background: linear-gradient(145deg, #6c3fa0 0%, #3d1a6e 60%, #2d1155 100%); padding: 32px 20px 24px; text-align: center; position: relative; overflow: hidden; }
        .header::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; background:rgba(255,255,255,0.05); border-radius:50%; }
        .header::after  { content:''; position:absolute; bottom:-30px; left:-20px; width:100px; height:100px; background:rgba(240,180,41,0.08); border-radius:50%; }
        .header-badge { background: var(--accent); color: #3d1a00; font-size: 11px; font-weight: 900; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
        .header h1 { color: white; font-size: 24px; font-weight: 900; line-height: 1.2; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }

        /* UNIT TABS */
        .unit-tabs { display: flex; gap: 6px; padding: 14px 14px 0; flex-wrap: wrap; }
        .unit-btn { flex: 1 1 calc(33% - 6px); padding: 8px 4px; border: none; border-radius: 10px; background: #f0ebff; color: #6c3fa0; font-size: 12px; font-weight: 800; cursor: pointer; transition: .2s; }
        .unit-btn:hover { background: #e0d5ff; }
        .unit-btn.active { background: var(--main); color: white; box-shadow: 0 3px 10px rgba(108,63,160,0.3); }
        .unit-btn.done { background: var(--green); color: white; }

        /* SECTIONS */
        .section { display: none; padding: 16px 18px 0; animation: fadeIn .3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        /* INTRO */
        .intro-wrap { text-align: center; padding: 20px 10px 10px; }
        .intro-icon { font-size: 4rem; margin-bottom: 10px; }
        .intro-wrap h2 { color: var(--main); font-size: 20px; font-weight: 900; margin-bottom: 8px; }
        .intro-wrap p { color: #718096; font-size: 14px; font-weight: 600; line-height: 1.7; }

        /* EVO BOX */
        .evo-box { background: var(--light); border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; border: 1.5px solid #d8ccf5; }
        .evo-emoji { font-size: 2.6rem; display: inline-block; transition: transform .3s cubic-bezier(.17,.89,.32,1.27); }
        .evo-name { font-size: 13px; font-weight: 900; color: var(--main); margin: 3px 0 8px; }
        .prog-bg { background: #e8e0f5; height: 10px; border-radius: 8px; overflow: hidden; }
        .prog-bar { background: linear-gradient(90deg, var(--accent), var(--main)); height: 100%; width: 0%; transition: width .5s ease; border-radius: 8px; }

        /* STATUS ROW */
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .status-badge { background: #f0ebff; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 800; color: var(--main); }
        .stop-btn { background: #f0ebff; border: none; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; color: #718096; }

        /* UNIT LABEL */
        .unit-label { display: inline-block; background: var(--accent); color: #3d1a00; font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 1px; }

        /* QUESTION BOX */
        .q-box { background: var(--light); border: 2px solid #d8ccf5; border-radius: 16px; padding: 20px 16px; margin-bottom: 16px; font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.6; word-break: keep-all; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .blank { display: inline-block; min-width: 70px; border-bottom: 3px solid var(--main); color: var(--main); font-weight: 900; text-align: center; padding: 0 8px; transition: .3s; }
        .blank.correct { color: var(--green); border-color: var(--green); }
        .blank.wrong   { color: var(--red);   border-color: var(--red);   }

        /* KO HINT */
        .ko-hint { background: #fffbeb; border-left: 4px solid var(--accent); border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 800; color: #7d4800; margin-bottom: 14px; line-height: 1.5; word-break: keep-all; }

        /* OPTIONS */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .opt-btn { background: white; border: 2px solid #e0d5ff; padding: 14px 10px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: .15s; color: var(--text); text-align: center; }
        .opt-btn:hover { border-color: var(--main); background: var(--light); }
        .opt-btn.correct { background: #dcfce7; border-color: var(--green); color: #166534; transform: scale(1.03); }
        .opt-btn.wrong   { background: #fee2e2; border-color: var(--red);   color: #991b1b; animation: shake .4s; }

        /* RESULT */
        .result-wrap { text-align: center; padding: 20px 10px; }
        .result-emoji { font-size: 4.5rem; margin-bottom: 10px; }
        .score-big { font-size: 3.5rem; font-weight: 900; color: var(--main); margin: 10px 0 4px; }
        .score-detail { font-size: 15px; color: #718096; font-weight: 700; margin-bottom: 6px; }
        .score-pct { font-size: 14px; font-weight: 800; margin-bottom: 20px; }

        /* UNIT BREAKDOWN */
        .breakdown { background: var(--light); border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; }
        .breakdown h3 { font-size: 14px; font-weight: 900; color: var(--main); margin-bottom: 10px; }
        .bd-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #e0d5ff; font-size: 13px; font-weight: 700; }
        .bd-row:last-child { border-bottom: none; }
        .bd-score { font-weight: 900; color: var(--main); }
        .bd-bar-bg { background: #e0d5ff; height: 6px; border-radius: 4px; flex: 1; margin: 0 10px; overflow: hidden; }
        .bd-bar { background: var(--main); height: 100%; border-radius: 4px; transition: width .6s ease; }

        /* WRONG REVIEW */
        .wrong-section { background: #fff5f5; border: 2px solid #fecaca; border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; }
        .wrong-section h3 { font-size: 14px; font-weight: 900; color: var(--red); margin-bottom: 10px; }
        .wrong-item { padding: 8px 10px; background: white; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--red); }
        .wrong-q { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
        .wrong-ans { font-size: 12px; color: #718096; }
        .wrong-ans b { color: var(--green); }

        /* COMBO */
        #combo { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%) scale(.5); font-size: 2.8rem; font-weight: 900; color: var(--accent); text-shadow: 0 3px 10px rgba(240,180,41,.5); opacity: 0; pointer-events: none; z-index: 99; }
        .combo-pop { animation: comboAnim 1s cubic-bezier(.17,.89,.32,1.27) forwards; }

        /* BTNS */
        .primary-btn { width: 100%; background: var(--main); color: white; border: none; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 900; cursor: pointer; transition: .2s; box-shadow: 0 4px 14px rgba(108,63,160,.3); margin-top: 12px; }
        .primary-btn:hover { background: var(--main2); transform: translateY(-1px); }
        .primary-btn.yellow { background: var(--accent); color: #3d1a00; box-shadow: 0 4px 14px rgba(240,180,41,.3); }
        .primary-btn.yellow:hover { background: var(--accent2); }

        /* HISTORY */
        .hist-category { background: #f0ebff; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 800; margin: 14px 0 10px; border-left: 4px solid var(--main); color: var(--main); }
        .hist-card { background: white; border: 1.5px solid #e0d5ff; border-radius: 12px; padding: 12px 14px; margin-bottom: 9px; display: flex; justify-content: space-between; align-items: center; }
        .hist-date { font-size: 12px; color: #718096; font-weight: 700; }
        .hist-score-text { font-size: 18px; font-weight: 900; color: var(--main); }
        .stamp { color: var(--red); font-weight: 900; font-size: 13px; border: 2px solid var(--red); padding: 3px 7px; border-radius: 8px; transform: rotate(-8deg); display: inline-block; }

        /* NAV */
        .nav { display: flex; gap: 6px; padding: 12px 14px 0; }
        .nav-btn { flex: 1; padding: 9px 2px; border: none; border-radius: 10px; background: #f0ebff; color: var(--main); font-size: 12px; font-weight: 700; cursor: pointer; transition: .2s; }
        .nav-btn.active { background: var(--main); color: white; }

        @keyframes comboAnim { 0%{opacity:0;transform:translate(-50%,-30%) scale(.5)} 20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} 80%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-60%) scale(.8)} }
        @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-6px)} 100%{transform:translateX(0)} }
    </style>
</head>
<body>
<div id="app">
    <div id="combo"></div>
    <div class="header">
        <div class="header-badge">Grammar Only 1</div>
        <h1>📚 수리나무학원<br>문법 집중 훈련</h1>
        <p>Unit 03~08 · 인칭대명사 · 지시대명사 · be동사</p>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showTab('quiz-tab', this)">문법 퀴즈</button>
        <button class="nav-btn" onclick="showTab('hist-tab', this); renderHistory()">기록</button>
    </div>

    <!-- ===== QUIZ TAB ===== -->
    <div id="quiz-tab" class="section active">
        <!-- INTRO -->
        <div id="g-intro" class="intro-wrap">
            <div class="intro-icon">🥚</div>
            <h2>문법 마스터 용 키우기!</h2>
            <p>Unit 03~08 핵심 문법을<br>50문제로 완벽 정복해 보세요.<br><br>
            <span style="color:var(--main);font-weight:900">인칭대명사 · 지시대명사<br>be동사 현재/부정/과거 · There is/are</span></p>
            <button class="primary-btn" onclick="initAudio();startQuiz()">퀴즈 시작하기 🚀</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="g-quiz" style="display:none">
            <div class="status-row">
                <span class="status-badge" id="g-status">문제 1 / 50</span>
                <button class="stop-btn" onclick="finishQuiz(true)">🛑 중간 채점</button>
            </div>
            <div class="evo-box">
                <div class="evo-emoji" id="gevo-e">🥚</div>
                <div class="evo-name"  id="gevo-n">신비한 수리나무 알 (0%)</div>
                <div class="prog-bg"><div class="prog-bar" id="gevo-b"></div></div>
            </div>
            <div class="unit-label" id="g-unit-label">Unit 03</div>
            <div class="ko-hint" id="g-ko">한글 힌트</div>
            <div class="q-box" id="g-qbox">질문</div>
            <div class="options-grid" id="g-opts"></div>
        </div>

        <!-- RESULT -->
        <div id="g-result" style="display:none">
            <div class="result-wrap">
                <div class="result-emoji" id="g-res-e">🐉✨</div>
                <h2 style="color:var(--main);font-size:20px;margin-bottom:4px">훈련 완료!</h2>
                <div class="score-big" id="g-score">100점</div>
                <div class="score-detail" id="g-detail">정답: 50 / 50</div>
                <div class="score-pct" id="g-pct-msg"></div>
            </div>
            <div class="breakdown" id="g-breakdown"></div>
            <div class="wrong-section" id="g-wrong-list" style="display:none">
                <h3>🔍 틀린 문제 복습</h3>
                <div id="g-wrong-items"></div>
            </div>
            <button class="primary-btn" onclick="resetQuiz()">새로운 알 부화하기 🔄</button>
            <button class="primary-btn yellow" style="margin-top:8px" onclick="retryWrong()" id="retry-btn">틀린 문제만 다시 풀기 🔁</button>
        </div>
    </div>

    <!-- ===== HISTORY TAB ===== -->
    <div id="hist-tab" class="section">
        <h3 style="color:var(--main);margin:0 0 4px">🏆 수리나무 명예의 전당</h3>
        <p style="font-size:13px;color:#718096;font-weight:600;margin-bottom:4px">Grammar Only 1 성적 기록</p>
        <div id="hist-list"></div>
    </div>
</div>

<script>
// ============================================================
// QUIZ DATA  —  50문제 (Unit 03~08)
// { unit, ko, q (질문, ___ = 빈칸), opts:[4개], ans }
// ============================================================
const allQuestions = [
    // ── Unit 03: 인칭대명사 ─────────────────────────────────
    { unit:"Unit 03", ko:"Kate는 여자아이 한 명이에요. 빈칸에 알맞은 인칭대명사는?",
      q:"Kate is my friend. ___ is kind.", opts:["He","She","It","They"], ans:"She" },
    { unit:"Unit 03", ko:"a lion(사자 한 마리)을 가리키는 인칭대명사는?",
      q:"Look at the lion. ___ is big.", opts:["He","She","It","They"], ans:"It" },
    { unit:"Unit 03", ko:"my father and I(아버지와 나)를 가리키는 인칭대명사는?",
      q:"My father and I are at home. ___ are happy.", opts:["He","We","They","She"], ans:"We" },
    { unit:"Unit 03", ko:"two dogs(개 두 마리)를 가리키는 인칭대명사는?",
      q:"I have two dogs. ___ are cute.", opts:["It","He","We","They"], ans:"They" },
    { unit:"Unit 03", ko:"Mr. Smith(남성 선생님)를 가리키는 인칭대명사는?",
      q:"Mr. Smith is my teacher. ___ is strict.", opts:["She","It","He","We"], ans:"He" },
    { unit:"Unit 03", ko:"'나는 이 가방을 원한다'에서 나를 뜻하는 인칭대명사는?",
      q:"___ want this bag.", opts:["He","She","I","We"], ans:"I" },
    { unit:"Unit 03", ko:"Jessica and Kevin을 가리키는 인칭대명사는?",
      q:"Jessica and Kevin are friends. ___ are funny.", opts:["We","She","He","They"], ans:"They" },
    { unit:"Unit 03", ko:"'you and I'를 대신하는 인칭대명사는?",
      q:"You and I are classmates. ___ are good friends.", opts:["They","We","He","It"], ans:"We" },

    // ── Unit 04: 지시대명사 ─────────────────────────────────
    { unit:"Unit 04", ko:"가까이 있는 사물 하나를 가리킬 때 쓰는 지시대명사는?",
      q:"___ is my pencil. (가까이, 하나)", opts:["That","These","This","Those"], ans:"This" },
    { unit:"Unit 04", ko:"멀리 있는 사물 하나를 가리킬 때 쓰는 지시대명사는?",
      q:"___ is a book. (멀리, 하나)", opts:["This","These","Those","That"], ans:"That" },
    { unit:"Unit 04", ko:"가까이 있는 사물 여러 개를 가리킬 때는?",
      q:"___ are my pencils. (가까이, 여러 개)", opts:["That","This","Those","These"], ans:"These" },
    { unit:"Unit 04", ko:"멀리 있는 사물 여러 개를 가리킬 때는?",
      q:"___ are your books. (멀리, 여러 개)", opts:["These","This","That","Those"], ans:"Those" },
    { unit:"Unit 04", ko:"오늘은 월요일이다. 날짜/날씨를 나타낼 때 쓰는 것은?",
      q:"___ is Monday today.", opts:["This","That","It","These"], ans:"It" },
    { unit:"Unit 04", ko:"저분들은 우리 학교 선생님들이다. 멀리 있는 여러 명은?",
      q:"___ are my school teachers.", opts:["This","Those","These","That"], ans:"Those" },
    { unit:"Unit 04", ko:"이것들은 매우 흥미로운 책이다. 가까이 있는 여러 개는?",
      q:"___ are very interesting books.", opts:["Those","This","That","These"], ans:"These" },
    { unit:"Unit 04", ko:"저 사진은 아주 멋지다. 멀리 있는 하나는?",
      q:"___ picture is wonderful.", opts:["This","These","Those","That"], ans:"That" },

    // ── Unit 05: be동사 현재형 (am / is / are) ──────────────
    { unit:"Unit 05", ko:"'나는 행복하다'에서 빈칸에 알맞은 be동사는?",
      q:"I ___ happy.", opts:["is","are","am","be"], ans:"am" },
    { unit:"Unit 05", ko:"'그들은 치과의사들이다'에서 빈칸에 알맞은 be동사는?",
      q:"We ___ dentists.", opts:["am","is","be","are"], ans:"are" },
    { unit:"Unit 05", ko:"'그녀는 오늘 바쁘다'에서 빈칸에 알맞은 be동사는?",
      q:"She ___ busy today.", opts:["are","am","be","is"], ans:"is" },
    { unit:"Unit 05", ko:"'그것은 연필이다'에서 빈칸에 알맞은 be동사는?",
      q:"It ___ a pencil.", opts:["am","are","be","is"], ans:"is" },
    { unit:"Unit 05", ko:"'You are a nurse'의 축약형은?",
      q:"You are a nurse. → ___ a nurse.", opts:["You're","You is","You am","Yours"], ans:"You're" },
    { unit:"Unit 05", ko:"'It is a soccer ball'의 축약형은?",
      q:"It is a soccer ball. → ___ a soccer ball.", opts:["Its","It're","It's","Itis"], ans:"It's" },
    { unit:"Unit 05", ko:"'We are in the theater'의 축약형은?",
      q:"We are in the theater. → ___ in the theater.", opts:["We is","We're","Wes","We am"], ans:"We're" },
    { unit:"Unit 05", ko:"'David and I'에 알맞은 be동사는?",
      q:"David and I ___ in the library.", opts:["am","is","be","are"], ans:"are" },

    // ── Unit 06: be동사 부정문 / 의문문 ─────────────────────
    { unit:"Unit 06", ko:"'She is not a singer'의 줄임말(isn't 사용)은?",
      q:"She is not a singer. → She ___ a singer.", opts:["isn't","not is","is'nt","amn't"], ans:"isn't" },
    { unit:"Unit 06", ko:"'I am not'의 올바른 축약형은?",
      q:"I'm not angry. → 이 문장에서 I'm not은 ___ 의 줄임말.",
      opts:["I amn't","I are not","I am not","I isn't"], ans:"I am not" },
    { unit:"Unit 06", ko:"'They are not from Korea'의 줄임말은?",
      q:"They ___ from Korea.", opts:["aren't","isn't","amn't","not are"], ans:"aren't" },
    { unit:"Unit 06", ko:"be동사 의문문: 'You are busy'를 의문문으로 바꾸면?",
      q:"You are busy. → ___ you busy?", opts:["Am","Is","Are","Be"], ans:"Are" },
    { unit:"Unit 06", ko:"be동사 의문문: 'He is a great pianist'를 의문문으로 바꾸면?",
      q:"He is a great pianist. → ___ he a great pianist?", opts:["Are","Am","Be","Is"], ans:"Is" },
    { unit:"Unit 06", ko:"'Are you actors? — Yes, ___.'에 알맞은 대답은?",
      q:"Are you actors? — Yes, ___.", opts:["I am","we are","they are","you are"], ans:"we are" },
    { unit:"Unit 06", ko:"'Is this movie very funny?'에 알맞은 부정 대답은?",
      q:"Is this movie very funny? — No, ___ very funny.",
      opts:["it isn't","they aren't","it aren't","this isn't"], ans:"it isn't" },
    { unit:"Unit 06", ko:"'They are at home'을 의문문으로 바꾸면?",
      q:"They are at home. → ___ they at home?", opts:["Is","Am","Be","Are"], ans:"Are" },

    // ── Unit 07: be동사 과거형 (was / were) ─────────────────
    { unit:"Unit 07", ko:"'그는 신났다'의 과거형에 알맞은 be동사는?",
      q:"He ___ excited. (과거)", opts:["is","are","were","was"], ans:"was" },
    { unit:"Unit 07", ko:"'나는 집에 없었다'의 과거 부정형은?",
      q:"I ___ at home. (과거 부정)", opts:["wasn't","weren't","isn't","aren't"], ans:"wasn't" },
    { unit:"Unit 07", ko:"'그들은 도서관에서 기뻤다'의 과거형은?",
      q:"We ___ glad to meet you. (과거)", opts:["was","is","am","were"], ans:"were" },
    { unit:"Unit 07", ko:"'The cats were on the sofa'의 과거 부정은?",
      q:"The cats ___ on the sofa. (과거 부정)", opts:["wasn't","isn't","weren't","aren't"], ans:"weren't" },

// ============================================================
// HELPERS
// ============================================================
let audioCtx = null, comboCount = 0;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(f,t,d,v=0.07) {
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=t; o.frequency.setValueAtTime(f,audioCtx.currentTime);
    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
}
function sfxOK()  { tone(600,'sine',.1); setTimeout(()=>tone(850,'sine',.15),100); }
function sfxNG()  { tone(260,'sawtooth',.22,.12); }
function sfxEvo() { [380,500,660].forEach((f,i)=>setTimeout(()=>tone(f,'square',.2,.06),i*150)); }
function boom()   { sfxEvo(); confetti({particleCount:150,spread:80,origin:{y:.6},colors:['#6c3fa0','#f0b429','#22c55e','#ef4444']}); }

function shuffle(a) {
    let arr=[...a];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
}
function todayKey() { const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
function fmtDate(d) { return d.replace(/-/g,'. '); }

function showCombo(ok) {
    if(ok) comboCount++; else { comboCount=0; return; }
    if(comboCount < 2) return;
    const el=document.getElementById('combo');
    el.innerText=`${comboCount} COMBO! ✨`;
    el.classList.remove('combo-pop'); void el.offsetWidth; el.classList.add('combo-pop');
}

function updateEvo(cur, tot) {
    const r = tot===0 ? 0 : cur/tot;
    const s=[[0,'🥚','신비한 수리나무 알'],[.001,'🐣','부화하는 아기 용'],[.25,'🦎','꼬마 드래곤'],[.5,'🦖','파워 용'],[.75,'🐲','비상하는 매직 용'],[1,'🐉✨','수리나무 마스터 용!!']];
    let st=s[0]; for(const x of s) if(r>=x[0]) st=x;
    const pct=Math.floor(r*100);
    const em=document.getElementById('gevo-e');
    em.innerText=st[1]; em.style.transform='scale(1.3)';
    setTimeout(()=>em.style.transform='scale(1)',300);
    document.getElementById('gevo-n').innerText=`${st[2]} (${pct}%)`;
    document.getElementById('gevo-b').style.width=pct+'%';
}

function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

// ============================================================
// QUIZ LOGIC
// ============================================================
let qList=[], qIdx=0, qOK=0, qBusy=false;
let unitStats={};   // { "Unit 03": {ok:0,total:0}, ... }
let wrongList=[];   // 틀린 문제 배열
let isRetryMode=false;

function startQuiz(retryList=null) {
    isRetryMode = !!retryList;
    qList = retryList ? shuffle(retryList) : shuffle([...allQuestions]);
    qIdx=0; qOK=0; comboCount=0; wrongList=[];
    unitStats={};
    qList.forEach(q=>{ if(!unitStats[q.unit]) unitStats[q.unit]={ok:0,total:0}; unitStats[q.unit].total++; });

    document.getElementById('g-intro').style.display='none';
    document.getElementById('g-result').style.display='none';
    document.getElementById('g-quiz').style.display='block';
    loadQ();
}

function loadQ() {
    qBusy=false;
    updateEvo(qIdx, qList.length);
    const q=qList[qIdx];
    document.getElementById('g-status').innerText=`문제 ${qIdx+1} / ${qList.length}`;
    document.getElementById('g-unit-label').innerText=q.unit;
    document.getElementById('g-ko').innerText=q.ko;

    // render question with blank
    const qBox=document.getElementById('g-qbox');
    qBox.innerHTML = q.q.replace('___', `<span class="blank" id="q-blank">___</span>`);

    // render options (shuffled)
    const opts=shuffle([...q.opts]);
    const grid=document.getElementById('g-opts'); grid.innerHTML='';
    opts.forEach((o,i)=>{
        const b=document.createElement('button'); b.className='opt-btn';
        b.innerHTML=`<span style="color:var(--main);margin-right:6px">${['①','②','③','④'][i]}</span>${o}`;
        b.onclick=()=>handleQ(b, o, q);
        grid.appendChild(b);
    });
}

function handleQ(btn, chosen, q) {
    if(qBusy) return; qBusy=true;
    const isOK = chosen===q.ans;
    showCombo(isOK);
    const blank=document.getElementById('q-blank');
    if(blank) { blank.innerText=chosen; blank.classList.add(isOK?'correct':'wrong'); }

    if(isOK) {
        sfxOK(); btn.classList.add('correct'); qOK++;
        unitStats[q.unit].ok++;
    } else {
        sfxNG(); btn.classList.add('wrong');
        wrongList.push(q);
        // show correct answer
        for(const b of document.querySelectorAll('#g-opts .opt-btn')) {
            if(b.innerText.includes(q.ans)) { b.classList.add('correct'); break; }
        }
    }
    setTimeout(()=>{ qIdx++; qIdx<qList.length ? loadQ() : finishQuiz(); }, 900);
}

function finishQuiz(early=false) {
    const tot = early ? qIdx : qList.length;
    if(tot===0){resetQuiz();return;}
    const sc=Math.round(qOK/tot*100);
    updateEvo(qIdx, qList.length);

    setTimeout(()=>{
        document.getElementById('g-quiz').style.display='none';
        document.getElementById('g-result').style.display='block';

        // emoji & score
        const em=document.getElementById('g-res-e');
        em.innerText = sc>=90?'🐉✨':sc>=70?'🐲':sc>=50?'🦖':'🥚💦';
        const sd=document.getElementById('g-score');
        sd.innerText=sc+'점';
        sd.style.color=sc>=90?'var(--main)':sc>=70?'#d97706':'var(--red)';
        document.getElementById('g-detail').innerText=`정답: ${qOK}개 / ${tot}문항`;
        const pm=document.getElementById('g-pct-msg');
        pm.innerText = sc>=90?'🎉 완벽합니다! 수리나무 마스터!':sc>=70?'👍 잘했어요! 조금만 더!':'💪 다시 한번 도전해봐요!';
        pm.style.color = sc>=90?'var(--green)':sc>=70?'#d97706':'var(--red)';

        // unit breakdown
        const bdDiv=document.getElementById('g-breakdown');
        bdDiv.innerHTML='<h3>📊 Unit별 성적</h3>';
        Object.entries(unitStats).forEach(([unit,st])=>{
            if(st.total===0) return;
            const pct=Math.round(st.ok/st.total*100);
            bdDiv.insertAdjacentHTML('beforeend',`
                <div class="bd-row">
                    <span style="min-width:70px">${unit}</span>
                    <div class="bd-bar-bg"><div class="bd-bar" style="width:${pct}%"></div></div>
                    <span class="bd-score">${st.ok}/${st.total}</span>
                </div>`);
        });

        // wrong review
        const retryBtn=document.getElementById('retry-btn');
        if(wrongList.length>0) {
            const wSec=document.getElementById('g-wrong-list');
            wSec.style.display='block';
            const wItems=document.getElementById('g-wrong-items');
            wItems.innerHTML='';
            wrongList.forEach(q=>{
                wItems.insertAdjacentHTML('beforeend',`
                    <div class="wrong-item">
                        <div class="wrong-q">${q.q.replace('___','( ? )')}</div>
                        <div class="wrong-ans">정답: <b>${q.ans}</b></div>
                    </div>`);
            });
            retryBtn.style.display='block';
        } else {
            retryBtn.style.display='none';
            document.getElementById('g-wrong-list').style.display='none';
        }

        saveHistory(sc, qOK, tot);
        if(!early && sc>=90) boom();
    },500);
}

function retryWrong() {
    if(wrongList.length===0) return;
    startQuiz([...wrongList]);
}

function resetQuiz() {
    document.getElementById('g-result').style.display='none';
    document.getElementById('g-intro').style.display='block';
}

// ============================================================
// HISTORY
// ============================================================
function saveHistory(sc, ok, tot) {
    const dk=todayKey();
    let arr=JSON.parse(localStorage.getItem('go1_hist')||'[]');
    arr.unshift({date:dk, score:sc, ok, tot});
    if(arr.length>15) arr=arr.slice(0,15);
    localStorage.setItem('go1_hist',JSON.stringify(arr));
}

function renderHistory() {
    const div=document.getElementById('hist-list'); div.innerHTML='';
    const arr=JSON.parse(localStorage.getItem('go1_hist')||'[]');
    if(!arr.length) { div.innerHTML='<p style="color:#a0aec0;font-size:13px;margin-top:10px">기록 없음</p>'; return; }
    div.insertAdjacentHTML('beforeend','<div class="hist-category">📝 Grammar Only 1 성적</div>');
    arr.slice(0,10).forEach(r=>{
        const st=r.score>=90?'<span class="stamp">마스터 🐉</span>':'';
        div.insertAdjacentHTML('beforeend',`
            <div class="hist-card">
                <div>
                    <div class="hist-date">${fmtDate(r.date)}</div>
                    <div class="hist-score-text">${r.score}점 <span style="font-size:12px;color:#a0aec0">(${r.ok}/${r.tot})</span></div>
                </div>
                ${st}
            </div>`);
    });
}
